<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotelFlow - Sistema de Gestión Hotelera</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a4d2e;
            --primary-light: #2d7a4c;
            --accent: #f4a261;
            --accent-dark: #e76f51;
            --bg: #faf8f3;
            --surface: #ffffff;
            --text: #2c3e50;
            --text-light: #6b7280;
            --border: #e5e7eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        #root {
            min-height: 100vh;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 2rem 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 4px 0 20px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 900;
            padding: 0 2rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 2rem;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--accent);
        }

        .user-info {
            padding: 0 2rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 1.5rem;
        }

        .user-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .user-role {
            font-size: 0.85rem;
            opacity: 0.8;
            background: rgba(255,255,255,0.15);
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            padding: 0.75rem 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 500;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.1);
            border-left-color: var(--accent);
        }

        .nav-item.active {
            background: rgba(255,255,255,0.2);
            border-left-color: var(--accent);
            font-weight: 600;
        }

        .nav-icon {
            font-size: 1.2rem;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-header {
            margin-bottom: 2rem;
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: var(--text-light);
            font-size: 1.1rem;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border);
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--surface) 0%, #f9fafb 100%);
            border-radius: 16px;
            padding: 1.75rem;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            animation: scaleIn 0.5s ease backwards;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            opacity: 0.1;
            transform: translate(30%, -30%);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-light);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Playfair Display', serif;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .stat-change {
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .stat-change.positive {
            color: var(--success);
        }

        .stat-change.negative {
            color: var(--danger);
        }

        /* Tables */
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
        }

        thead {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
        }

        th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        tr:hover {
            background: #f9fafb;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.success {
            background: #d1fae5;
            color: #065f46;
        }

        .badge.warning {
            background: #fef3c7;
            color: #92400e;
        }

        .badge.danger {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge.info {
            background: #dbeafe;
            color: #1e40af;
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 77, 46, 0.3);
        }

        .btn-accent {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: white;
        }

        .btn-accent:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(244, 162, 97, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        /* Alerts */
        .alert {
            padding: 1.25rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            animation: slideIn 0.5s ease;
            border-left: 4px solid;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .alert-warning {
            background: #fef3c7;
            color: #92400e;
            border-left-color: var(--warning);
        }

        .alert-danger {
            background: #fee2e2;
            color: #991b1b;
            border-left-color: var(--danger);
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-left-color: var(--success);
        }

        .alert-info {
            background: #dbeafe;
            color: #1e40af;
            border-left-color: var(--info);
        }

        .alert-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .alert-content {
            flex: 1;
        }

        .alert-title {
            font-weight: 700;
            margin-bottom: 0.25rem;
            font-size: 1.05rem;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--primary);
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Work Sans', sans-serif;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 77, 46, 0.1);
        }

        /* Grid Layouts */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .modal {
            background: var(--surface);
            border-radius: 16px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: scaleIn 0.3s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .modal-header {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border);
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary);
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        /* Progress Bar */
        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success) 0%, var(--primary) 100%);
            transition: width 0.3s ease;
        }

        .progress-fill.warning {
            background: linear-gradient(90deg, var(--warning) 0%, var(--accent) 100%);
        }

        .progress-fill.danger {
            background: linear-gradient(90deg, var(--danger) 0%, var(--accent-dark) 100%);
        }

        /* Chart Container */
        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 1rem;
        }

        /* Scenario Simulator */
        .scenario-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

        .scenario-btn {
            padding: 1rem 1.5rem;
            border: 2px solid var(--primary);
            background: var(--surface);
            color: var(--primary);
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 200px;
            text-align: center;
        }

        .scenario-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(26, 77, 46, 0.2);
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }

            .main-content {
                margin-left: 0;
                padding: 1rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .page-title {
                font-size: 2rem;
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-light);
        }

        /* Additional Utilities */
        .text-center {
            text-align: center;
        }

        .mb-1 {
            margin-bottom: 0.5rem;
        }

        .mb-2 {
            margin-bottom: 1rem;
        }

        .mt-2 {
            margin-top: 1rem;
        }

        .flex {
            display: flex;
        }

        .items-center {
            align-items: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .gap-1 {
            gap: 0.5rem;
        }

        .gap-2 {
            gap: 1rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Initial Data
        const initialGuests = [
            { id: 1, name: "Carlos Mendoza", checkin: "2026-03-01", checkout: "2026-03-05", plan: "Todo Incluido", adults: 2, children: 1, group: "Familia Mendoza", status: "activo" },
            { id: 2, name: "Ana García", checkin: "2026-03-02", checkout: "2026-03-06", plan: "Media Pensión", adults: 2, children: 0, group: "Individual", status: "activo" },
            { id: 3, name: "Hotel Corp - Grupo A", checkin: "2026-03-01", checkout: "2026-03-04", plan: "Todo Incluido", adults: 15, children: 3, group: "Agencia Viajes Plus", status: "activo" },
            { id: 4, name: "Roberto Suárez", checkin: "2026-03-03", checkout: "2026-03-08", plan: "Solo Desayuno", adults: 1, children: 0, group: "Individual", status: "pendiente" },
            { id: 5, name: "Familia Torres", checkin: "2026-02-28", checkout: "2026-03-03", plan: "Todo Incluido", adults: 4, children: 2, group: "Familia Torres", status: "activo" },
        ];

        const initialInventory = [
            { id: 1, name: "Arroz", category: "Alimentos", stock: 50, unit: "kg", minStock: 20, cost: 2.5 },
            { id: 2, name: "Pollo", category: "Alimentos", stock: 30, unit: "kg", minStock: 15, cost: 6.0 },
            { id: 3, name: "Cerveza", category: "Bebidas", stock: 120, unit: "unidades", minStock: 50, cost: 1.5 },
            { id: 4, name: "Vino Tinto", category: "Bebidas", stock: 25, unit: "botellas", minStock: 30, cost: 12.0 },
            { id: 5, name: "Ron", category: "Bebidas", stock: 15, unit: "botellas", minStock: 10, cost: 18.0 },
            { id: 6, name: "Jugo Naranja", category: "Bebidas", stock: 40, unit: "litros", minStock: 20, cost: 3.0 },
            { id: 7, name: "Vegetales Frescos", category: "Alimentos", stock: 25, unit: "kg", minStock: 15, cost: 3.5 },
            { id: 8, name: "Frutas Tropicales", category: "Alimentos", stock: 35, unit: "kg", minStock: 20, cost: 4.0 },
        ];

        const initialBarConsumption = [
            { id: 1, guest: "Carlos Mendoza", drink: "Cerveza", quantity: 4, time: "14:30", area: "Piscina", included: true, date: "2026-03-02" },
            { id: 2, guest: "Grupo A", drink: "Ron", quantity: 8, time: "20:15", area: "Bar Principal", included: true, date: "2026-03-02" },
            { id: 3, guest: "Ana García", drink: "Vino Tinto", quantity: 1, time: "19:00", area: "Restaurante", included: false, date: "2026-03-02" },
            { id: 4, guest: "Familia Torres", drink: "Jugo Naranja", quantity: 6, time: "09:00", area: "Restaurante", included: true, date: "2026-03-02" },
        ];

        // App Component
        function App() {
            const [currentPage, setCurrentPage] = useState("dashboard");
            const [currentUser, setCurrentUser] = useState({ name: "María González", role: "Administrador" });
            const [guests, setGuests] = useState(initialGuests);
            const [inventory, setInventory] = useState(initialInventory);
            const [barConsumption, setBarConsumption] = useState(initialBarConsumption);
            const [showModal, setShowModal] = useState(false);
            const [modalType, setModalType] = useState("");
            const [alerts, setAlerts] = useState([
                { id: 1, type: "warning", title: "Stock Bajo", message: "Vino Tinto por debajo del mínimo (25/30)", icon: "⚠️" },
                { id: 2, type: "info", title: "Llegada Programada", message: "Grupo de 15 personas llega mañana", icon: "ℹ️" }
            ]);

            const renderPage = () => {
                switch(currentPage) {
                    case "dashboard":
                        return <Dashboard guests={guests} inventory={inventory} barConsumption={barConsumption} alerts={alerts} />;
                    case "guests":
                        return <GuestsPage guests={guests} setGuests={setGuests} setShowModal={setShowModal} setModalType={setModalType} />;
                    case "meals":
                        return <MealsPage guests={guests} />;
                    case "bar":
                        return <BarPage barConsumption={barConsumption} setBarConsumption={setBarConsumption} guests={guests} />;
                    case "inventory":
                        return <InventoryPage inventory={inventory} setInventory={setInventory} />;
                    case "reports":
                        return <ReportsPage guests={guests} inventory={inventory} barConsumption={barConsumption} />;
                    case "costs":
                        return <CostsPage guests={guests} inventory={inventory} />;
                    case "scenarios":
                        return <ScenariosPage guests={guests} setGuests={setGuests} inventory={inventory} setInventory={setInventory} setAlerts={setAlerts} />;
                    default:
                        return <Dashboard guests={guests} inventory={inventory} barConsumption={barConsumption} alerts={alerts} />;
                }
            };

            return (
                <div className="app-container">
                    <Sidebar currentPage={currentPage} setCurrentPage={setCurrentPage} currentUser={currentUser} />
                    <div className="main-content">
                        {renderPage()}
                    </div>
                    {showModal && <Modal type={modalType} onClose={() => setShowModal(false)} guests={guests} setGuests={setGuests} />}
                </div>
            );
        }

        // Sidebar Component
        function Sidebar({ currentPage, setCurrentPage, currentUser }) {
            const menuItems = [
                { id: "dashboard", label: "Dashboard", icon: "📊" },
                { id: "guests", label: "Pasajeros", icon: "👥" },
                { id: "meals", label: "Restaurante", icon: "🍽️" },
                { id: "bar", label: "Control de Bar", icon: "🍹" },
                { id: "inventory", label: "Inventario", icon: "📦" },
                { id: "reports", label: "Reportes", icon: "📈" },
                { id: "costs", label: "Costos", icon: "💰" },
                { id: "scenarios", label: "Simulador", icon: "🎯" },
            ];

            return (
                <div className="sidebar">
                    <div className="logo">Hotel<span>Flow</span></div>
                    <div className="user-info">
                        <div className="user-name">{currentUser.name}</div>
                        <div className="user-role">{currentUser.role}</div>
                    </div>
                    <ul className="nav-menu">
                        {menuItems.map(item => (
                            <li 
                                key={item.id} 
                                className={`nav-item ${currentPage === item.id ? 'active' : ''}`}
                                onClick={() => setCurrentPage(item.id)}
                            >
                                <span className="nav-icon">{item.icon}</span>
                                <span>{item.label}</span>
                            </li>
                        ))}
                    </ul>
                </div>
            );
        }

        // Dashboard Component
        function Dashboard({ guests, inventory, barConsumption, alerts }) {
            const today = new Date('2026-03-02');
            const activeGuests = guests.filter(g => {
                const checkin = new Date(g.checkin);
                const checkout = new Date(g.checkout);

        // Plan Chart Component
        function PlanChart({ guests }) {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (canvasRef.current) {
                    const ctx = canvasRef.current.getContext('2d');
                    
                    if (chartRef.current) {
                        chartRef.current.destroy();
                    }

                    const planCounts = {};
                    guests.forEach(g => {
                        const total = g.adults + g.children;
                        planCounts[g.plan] = (planCounts[g.plan] || 0) + total;
                    });

                    chartRef.current = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: Object.keys(planCounts),
                            datasets: [{
                                data: Object.values(planCounts),
                                backgroundColor: [
                                    '#1a4d2e',
                                    '#2d7a4c',
                                    '#f4a261',
                                    '#e76f51'
                                ],
                                borderWidth: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'bottom',
                                    labels: {
                                        padding: 15,
                                        font: {
                                            size: 12,
                                            family: 'Work Sans'
                                        }
                                    }
                                }
                            }
                        }
                    });
                }

                return () => {
                    if (chartRef.current) {
                        chartRef.current.destroy();
                    }
                };
            }, [guests]);

            return (
                <div className="chart-container">
                    <canvas ref={canvasRef}></canvas>
                </div>
            );
        }

        // Weekly Chart Component
        function WeeklyChart() {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (canvasRef.current) {
                    const ctx = canvasRef.current.getContext('2d');
                    
                    if (chartRef.current) {
                        chartRef.current.destroy();
                    }

                    chartRef.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'],
                            datasets: [{
                                label: 'Pasajeros',
                                data: [18, 24, 22, 26, 30, 35, 28],
                                borderColor: '#1a4d2e',
                                backgroundColor: 'rgba(26, 77, 46, 0.1)',
                                tension: 0.4,
                                fill: true
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    display: false
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true
                                }
                            }
                        }
                    });
                }

                return () => {
                    if (chartRef.current) {
                        chartRef.current.destroy();
                    }
                };
            }, []);

            return (
                <div className="chart-container">
                    <canvas ref={canvasRef}></canvas>
                </div>
            );
        }

            const runScenario = (type) => {
                setSimulationActive(true);
                setSimulationType(type);

                setTimeout(() => {
                    if (type === "largeGroup") {
                        const newGuest = {
                            id: guests.length + 1,
                            name: "Grupo Empresarial XYZ",
                            checkin: "2026-03-03",
                            checkout: "2026-03-07",

                            group: "Corporativo XYZ",
                            status: "activo"

                        setGuests([...guests, newGuest]);
                        setAlerts(prev => [...prev, {
                            id: Date.now(),
                            type: "warning",
                            title: "Grupo Grande Confirmado",
                            message: "30 personas llegan mañana. Se requiere ajuste en stock de alimentos y bebidas.",
                            icon: "⚠️"
                        }]);
                        
                        // Simulate stock reduction
                        const updatedInventory = inventory.map(item => {
                            if (item.category === "Alimentos") {
                                return { ...item, stock: Math.max(0, item.stock - 15) };
                            }
                            if (item.category === "Bebidas") {
                                return { ...item, stock: Math.max(0, item.stock - 20) };
                            }
                            return item;
                        });
                        setInventory(updatedInventory);
                    } else if (type === "cancellation") {
                        const updatedGuests = guests.map(g => 
                            g.id === 3 ? { ...g, status: "cancelado" } : g
                        );
                        setGuests(updatedGuests);
                        setAlerts(prev => [...prev, {
                            id: Date.now(),
                            type: "info",

                            message: "Grupo A (18 personas) canceló su reserva. Ajuste automático en planificación.",

                            title: "Consumo Excesivo Detectado",
                            message: "Grupo Mendoza ha superado 12 bebidas por persona. Revisar política de consumo.",

                    } else if (type === "stockout") {
                        const updatedInventory = inventory.map(item => {

                                </div>
                                <div className="form-group">
                                    <label className="form-label">Check-out</label>
                                    <input 
                                        type="date" 
                                        className="form-input"
                                        value={formData.checkout}
                                        onChange={(e) => setFormData({...formData, checkout: e.target.value})}
                                        required
                                    />
                                </div>
                            </div>
                            <div className="form-group">
                                <label className="form-label">Plan</label>
                                <select 
                                    className="form-select"
                                    value={formData.plan}
                                    onChange={(e) => setFormData({...formData, plan: e.target.value})}
                                >
                                    <option>Todo Incluido</option>
                                    <option>Media Pensión</option>
                                    <option>Solo Desayuno</option>
                                </select>
                            </div>
                            <div className="grid-2">
                                <div className="form-group">
                                    <label className="form-label">Adultos</label>
                                    <input 
                                        type="number" 
                                        className="form-input"
                                        min="1"
                                        value={formData.adults}
                                        onChange={(e) => setFormData({...formData, adults: parseInt(e.target.value)})}
                                    />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Niños</label>
                                    <input 
                                        type="number" 
                                        className="form-input"
                                        min="0"
                                        value={formData.children}
                                        onChange={(e) => setFormData({...formData, children: parseInt(e.target.value)})}
                                    />
                                </div>
                            </div>
                            <div className="form-group">
                                <label className="form-label">Agencia / Grupo</label>
                                <input 
                                    type="text" 
                                    className="form-input"
                                    value={formData.group}
                                    onChange={(e) => setFormData({...formData, group: e.target.value})}
                                />
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-outline" onClick={onClose}>
                                    Cancelar
                                </button>
                                <button type="submit" className="btn btn-primary">
                                    Guardar Pasajero
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // Render App
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
